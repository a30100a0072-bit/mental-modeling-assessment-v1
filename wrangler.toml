#:schema https://updates.wrangler.dev/config-schema.json
name = "mental-modeling-assessment-v1"
main = "src/index.ts"
compatibility_date = "2026-04-06"

# 【雲端警衛設定】攔截所有發向 mbti.chiyigo.com/api/ 的請求，轉交給這個 Worker 處理
routes = [
  { pattern = "mbti.chiyigo.com/api/*", zone_name = "chiyigo.com" }
]

[vars]
ENGINE_VERSION = "V1"
# 【演算法參數】
SOFTMAX_TAU = "0.3"
# 【API 探針金鑰】用於前端提交測驗時的身份驗證，與 JWT 簽名金鑰完全分離
# 正式部署請執行: wrangler secret put API_PROBE_KEY
# 正式部署請執行: wrangler secret put HMAC_SECRET
# 正式部署請執行: wrangler secret put RESEND_API_KEY
# 以下僅供本地開發使用，請勿將真實金鑰提交至版本控制
API_PROBE_KEY = "dev_probe_key_replace_in_production"
# 【Turnstile 人機驗證】測試金鑰，永遠通過，部署前執行: wrangler secret put TURNSTILE_SECRET_KEY
TURNSTILE_SECRET_KEY = "1x0000000000000000000000000000000AA"

[[kv_namespaces]]
binding = "MM_CACHE_KV"
id = "4f7f301984454c84b36e93a2f238b8e9"

[[d1_databases]]
binding = "MM_DB_D1"
database_name = "mm_assessment_db"
database_id = "30d70b30-11de-4496-a17b-03f5f3243bcc"
migrations_dir = "migrations"

[[queues.producers]]
queue = "mm-assessment-events"
binding = "MM_EVENT_QUEUE"

[[durable_objects.bindings]]
name = "MM_SESSION_DO"
class_name = "AssessmentSession"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["AssessmentSession"]

[observability]
enabled = true