#:schema https://updates.wrangler.dev/config-schema.json
name = "mental-modeling-assessment-v1"
main = "src/index.ts"
compatibility_date = "2026-04-06"
pages_build_output_dir = "public"

# 【雲端警衛設定】攔截所有發向 mbti.chiyigo.com/api/ 的請求，轉交給這個 Worker 處理
routes = [
  { pattern = "mbti.chiyigo.com/api/*", zone_name = "chiyigo.com" }
]

[vars]
ENGINE_VERSION = "V1"
# SSO 跨站跳轉白名單（逗號分隔），新增網站只需修改此行並重新 deploy
SSO_ALLOWED_ORIGINS = "https://talo-web.pages.dev"
# 【演算法參數】
SOFTMAX_TAU = "0.3"

[[kv_namespaces]]
binding = "MM_CACHE_KV"
id = "4f7f301984454c84b36e93a2f238b8e9"

[[d1_databases]]
binding = "MM_DB_D1"
database_name = "mm_assessment_db"
database_id = "30d70b30-11de-4496-a17b-03f5f3243bcc"
migrations_dir = "migrations"

[[queues.producers]]
queue = "mm-assessment-events"
binding = "MM_EVENT_QUEUE"

# AssessmentSession Durable Object 從未實際使用，v2 migration 將其刪除。
# 保留 v1 tag 作為歷史紀錄，wrangler 會比對 tag 差異判斷需執行哪些 DO migration。
[[migrations]]
tag = "v1"
new_sqlite_classes = ["AssessmentSession"]

[[migrations]]
tag = "v2"
deleted_classes = ["AssessmentSession"]

[observability]
enabled = true