    <style>
        .detail-hero { background: linear-gradient(135deg, #0f172a, #162032); border-radius: 20px; padding: 40px; margin-top: 20px; border: 1px solid #1e293b; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .type-badge { display: inline-block; background: rgba(56, 189, 248, 0.1); color: #38bdf8; font-size: 2.5rem; font-weight: 900; padding: 10px 30px; border-radius: 12px; border: 1px solid #38bdf8; letter-spacing: 2px; margin-bottom: 15px; }
        .type-name-hero { font-size: 1.8rem; color: #f8fafc; font-weight: bold; margin-bottom: 10px; }
        .type-tagline { color: #94a3b8; font-size: 1.1rem; max-width: 600px; margin: 0 auto 30px; line-height: 1.6; }
        
        .stack-container { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-bottom: 20px; }
        .stack-box { background: #1e293b; border: 1px solid #334155; padding: 15px 20px; border-radius: 12px; text-align: center; min-width: 120px; }
        .stack-role { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        
        /* [新增] 認知功能懸浮註解 (Tooltip) 樣式 */
        .stack-func { font-size: 1.2rem; color: #e0f2fe; font-weight: bold; position: relative; cursor: help; }
        .stack-func:hover::after, .stack-func:active::after {
            content: attr(data-tip);
            position: absolute;
            bottom: 140%;
            left: 50%;
            transform: translateX(-50%);
            background: #0b1120;
            color: #e0f2fe;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            width: max-content;
            max-width: 220px;
            white-space: normal;
            line-height: 1.5;
            border: 1px solid #38bdf8;
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.6);
            pointer-events: none;
            font-family: sans-serif;
            font-weight: normal;
            text-transform: none;
        }

        .traits-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 30px; }
        .trait-tag { background: #0f172a; border: 1px solid #38bdf8; color: #bae6fd; padding: 8px 16px; border-radius: 20px; font-size: 0.9rem; }

        .content-section { background: #162032; border-radius: 16px; padding: 30px; margin-top: 20px; border: 1px solid #1e293b; }
        .content-section h3 { color: #38bdf8; font-size: 1.3rem; margin-top: 0; margin-bottom: 15px; border-bottom: 1px solid #1e293b; padding-bottom: 10px; }
        .content-section p { color: #cbd5e1; line-height: 1.8; font-size: 1.05rem; }
        .content-section.danger { border-color: #ef4444; background: rgba(239, 68, 68, 0.05); }
        .content-section.danger h3 { color: #fca5a5; border-bottom-color: rgba(239, 68, 68, 0.2); }
        .content-section.evolution { border-color: #10b981; background: rgba(16, 185, 129, 0.05); }
        .content-section.evolution h3 { color: #6ee7b7; border-bottom-color: rgba(16, 185, 129, 0.2); }

        .back-nav { margin-top: 20px; text-align: center; }
        .back-nav button { width: auto; padding: 12px 30px; font-size: 1rem; }
        
        @media (max-width: 480px) {
            .detail-hero { padding: 25px 15px; }
            .type-badge { font-size: 2rem; padding: 10px 20px; }
            .stack-container { gap: 10px; }
            .stack-box { min-width: 45%; padding: 10px; }
        }
    </style>
</head>
<body class="landing-body">
    <header class="landing-header">
        <div class="logo" style="cursor:pointer;" onclick="window.location.href='index.html'">🧠 認知幾何 V1</div>
        <div class="header-actions">
            <button class="btn-outline" id="dash-nav-btn" style="display: none; background: #38bdf8; color: #0f172a; border-color: #38bdf8;" onclick="window.location.href='dashboard.html'">進入儀表板</button>
            <button class="btn-outline" id="auth-nav-btn" onclick="window.location.href='login.html'">登入 / 註冊</button>
            <div class="hamburger" onclick="toggleSidebar()">☰</div>
        </div>
    </header>

    <div class="quick-nav-bar" style="display: flex; justify-content: center; gap: 10px; padding: 10px 15px; background: rgba(15, 23, 42, 0.9); border-bottom: 1px solid #1e293b; overflow-x: auto; white-space: nowrap;">
        <a href="assessment.html?v=D&new=1" style="color: #fde047; font-size: 0.85rem; font-weight: bold; border: 1px solid #fde047; padding: 5px 12px; border-radius: 20px; text-decoration: none;">▶ 模組 D (日常行為)</a>
        <a href="assessment.html?v=E&new=1" style="color: #fde047; font-size: 0.85rem; font-weight: bold; border: 1px solid #fde047; padding: 5px 12px; border-radius: 20px; text-decoration: none;">▶ 模組 E (決策情境)</a>
        <a href="assessment.html?v=F&new=1" style="color: #fde047; font-size: 0.85rem; font-weight: bold; border: 1px solid #fde047; padding: 5px 12px; border-radius: 20px; text-decoration: none;">▶ 模組 F (認知偏好)</a>
    </div>

    <div id="sidebar" class="sidebar">
        <div class="sidebar-header"><span>導覽選單</span><button class="close-btn" onclick="toggleSidebar()">✕</button></div>
        <div class="sidebar-content">
            <a href="index.html">首頁 (Home)</a>
            <a href="assessment.html?v=A&new=1">模組 A：日常舒適圈</a>
            <a href="assessment.html?v=B&new=1">模組 B：高壓防禦</a>
            <a href="assessment.html?v=C&new=1">模組 C：覺醒願景</a>
            <hr>
            <a href="assessment.html?v=D&new=1" style="color: #fde047; font-weight: bold;">模組 D：日常行為量表 (全新開放)</a>
            <a href="assessment.html?v=E&new=1" style="color: #fde047; font-weight: bold;">模組 E：決策情境量表 (全新開放)</a>
            <a href="assessment.html?v=F&new=1" style="color: #fde047; font-weight: bold;">模組 F：認知偏好量表 (全新開放)</a>
            <hr>
            <a href="mbti-types.html" class="active">👥 MBTI 16人格特質</a>
            <a href="dashboard.html">會員儀表板 (Dashboard)</a>
        </div>
    </div>
    <div id="sidebar-overlay" class="overlay" onclick="toggleSidebar()"></div>

    <main class="container" style="max-width: 800px; margin-top: 40px; background: transparent; box-shadow: none; border: none; padding: 0;">
        
        <div id="render-area">
            <div style="text-align: center; color: #38bdf8; padding: 50px;">載入心智模型中...</div>
        </div>

        <div class="back-nav">
            <button class="btn-secondary" onclick="window.location.href='mbti-types.html'">🔙 返回 16 人格圖鑑</button>
        </div>
    </main>

    <script src="personality-data.js"></script>
    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebar-overlay').classList.toggle('open');
        }

        // 認知底層註解字典
        const functionTips = {
            "Ti": "底層邏輯：尋求完美自洽的模型",
            "Te": "客觀秩序：推動高壓行政與資源調配",
            "Fi": "內在信仰：絕對不妥協的個人價值",
            "Fe": "群體共振：掌控環境情緒與人際網絡",
            "Ni": "終局收斂：戰略推演與長遠趨勢預判",
            "Ne": "發散擴張：跨界連結與顛覆既有概念",
            "Si": "經驗守護：死守歷史參數與防禦機制",
            "Se": "物理動態：即時適應並掌控物理環境"
        };
        // 提取縮寫代碼的輔助函數
        const getTip = (fullStr) => functionTips[fullStr.split(' ')[0]] || "";

        window.onload = () => {
            if (localStorage.getItem('mbti_jwt_token')) {
                document.getElementById('dash-nav-btn').style.display = 'inline-block';
                const authBtn = document.getElementById('auth-nav-btn');
                authBtn.innerText = "登出系統";
                authBtn.style.color = "#ef4444";
                authBtn.style.borderColor = "#ef4444";
                authBtn.classList.add('logout-mode');
                authBtn.onclick = () => {
                    localStorage.removeItem('mbti_jwt_token');
                    window.location.href = 'index.html';
                };
            }

            const urlParams = new URLSearchParams(window.location.search);
            const targetType = urlParams.get('type') || 'INTJ'; 
            
            const data = PERSONALITY_DATABASE[targetType.toUpperCase()];
            const renderArea = document.getElementById('render-area');

            if (!data) {
                renderArea.innerHTML = `<h2 style="color:#ef4444; text-align:center;">找不到該人格型態的資料，請返回上一頁。</h2>`;
                return;
            }

            const traitsHtml = data.traits.map(t => `<div class="trait-tag">◈ ${t}</div>`).join('');

            renderArea.innerHTML = `
                <div class="detail-hero">
                    <div class="type-badge">${targetType}</div>
                    <div class="type-name-hero">${data.name}</div>
                    <div class="type-tagline">"${data.tagline}"</div>
                    
                    <div class="stack-container">
                        <div class="stack-box"><div class="stack-role">主導 (Ego)</div><div class="stack-func" data-tip="${getTip(data.stack.dom)}">${data.stack.dom}</div></div>
                        <div class="stack-box"><div class="stack-role">輔助 (Parent)</div><div class="stack-func" data-tip="${getTip(data.stack.aux)}">${data.stack.aux}</div></div>
                        <div class="stack-box"><div class="stack-role">第三 (Child)</div><div class="stack-func" data-tip="${getTip(data.stack.tert)}">${data.stack.tert}</div></div>
                        <div class="stack-box" style="border-color: #ef4444;"><div class="stack-role" style="color: #fca5a5;">劣勢 (Inferior)</div><div class="stack-func" style="color: #fca5a5;" data-tip="${getTip(data.stack.inf)}">${data.stack.inf}</div></div>
                    </div>

                    <div class="traits-list">
                        ${traitsHtml}
                    </div>
                </div>

                <div class="content-section">
                    ${data.career}
                </div>

                <div class="content-section">
                    ${data.relationship}
                </div>

                <div class="content-section danger">
                    ${data.shadow}
                </div>

                <div class="content-section evolution">
                    ${data.evolution}
                </div>
            `;
        };
    </script>
</body>
