<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<title>Logout</title>
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png">
<script>
  // OIDC Front-Channel Logout 1.0：被 chiyigo end_session_endpoint 嵌入 iframe
  // 清自己 origin 的 storage + 觸發 storage event 給同源主頁分頁即時感知
  try { sessionStorage.removeItem('chiyigo_access_token') } catch (_) {}
  try { sessionStorage.removeItem('chiyigo_id_token') } catch (_) {}
  try { sessionStorage.removeItem('chiyigo_email') } catch (_) {}
  try { localStorage.setItem('oidc_logout_at', String(Date.now())) } catch (_) {}
</script>
    <script src="gtag-init.js?v=1" async></script>
</head>
<body></body>
</html>
